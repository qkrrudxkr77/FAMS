{% extends "layout/base.html" %}

{% block title %}대시보드 — FAMS{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">
        <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/>
            <rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>
        </svg>
        대시보드
    </h1>
</div>

<div class="card" style="min-height: 320px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px;">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/>
        <rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>
    </svg>
    <p class="text-muted" style="font-size: 15px; font-weight: 500;">대시보드</p>
    <p class="text-muted" style="font-size: 13px;">추후 주요 지표 및 현황이 표시될 예정입니다.</p>
</div>
{% endblock %}

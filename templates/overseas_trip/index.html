{% extends "layout/base.html" %}

{% block title %}해외출장관리 — FAMS{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">
        <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.73 12 19.79 19.79 0 0 1 1.68 3.37 2 2 0 0 1 3.68 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6 6l.81-.81a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            <path d="M16 3h6v6"/><path d="M22 3l-7.5 7.5"/>
        </svg>
        해외출장관리
    </h1>
    <div style="display:flex; gap:8px;">
        <button class="btn btn-secondary btn-sm" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            엑셀 다운로드
        </button>
        <button class="btn btn-primary btn-sm" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            신규 등록
        </button>
    </div>
</div>

<!-- 안내 배너 -->
<div class="card" style="background: #EFF6FF; border: 1px solid #BFDBFE; padding: 16px 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <div>
        <p style="font-weight: 600; color: #1E40AF; font-size: 13px;">개발 진행 중</p>
        <p style="color: #3B82F6; font-size: 13px; margin-top: 2px;">워크쓰루 해외 출장 신청서 및 BTMS 자동 연동 기능이 개발 예정입니다.</p>
    </div>
</div>

<!-- 검색 필터 -->
<div class="card" style="margin-bottom: 24px;">
    <div style="display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap;">
        <div class="form-group" style="margin:0; flex: 1; min-width: 140px;">
            <label style="font-size:12px; font-weight:600; color:#6B7280; display:block; margin-bottom:6px;">기간</label>
            <input type="month" class="form-control" style="max-width:160px;" disabled>
        </div>
        <div class="form-group" style="margin:0; flex: 2; min-width: 180px;">
            <label style="font-size:12px; font-weight:600; color:#6B7280; display:block; margin-bottom:6px;">검색</label>
            <input type="text" class="form-control" placeholder="부서, 성명, 국가, 지역 검색..." disabled>
        </div>
        <button class="btn btn-primary" disabled>검색</button>
    </div>
</div>

<!-- 데이터 테이블 -->
<div class="card" style="padding: 0; overflow: hidden;">
    <div style="padding: 16px 20px; border-bottom: 1px solid #F3F4F6; display: flex; align-items: center; justify-content: space-between;">
        <span style="font-weight: 600; font-size: 14px; color: #111827;">출장 내역</span>
        <span style="font-size: 12px; color: #9CA3AF;">총 0건</span>
    </div>
    <div class="table-wrap" style="border-radius: 0; border: none;">
        <table>
            <thead>
                <tr>
                    <th>No</th>
                    <th>부서</th>
                    <th>직급</th>
                    <th>성명</th>
                    <th>국가</th>
                    <th>지역</th>
                    <th>시작일</th>
                    <th>종료일</th>
                    <th>기간</th>
                    <th>제목</th>
                    <th>출장목적</th>
                    <th>해외출장품의서</th>
                    <th>출장비</th>
                    <th>항공료</th>
                    <th>여행사수수료</th>
                </tr>
            </thead>
            <tbody id="tripTableBody">
                <tr>
                    <td colspan="15" class="text-center text-muted" style="padding: 60px 0;">
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:block; margin: 0 auto 12px;">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
                        </svg>
                        데이터가 없습니다. (개발 예정)
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

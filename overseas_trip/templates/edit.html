<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>{{ '신규 등록' if not row else '출장 정보 수정' }} · FAMS</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="22" x2="21" y2="22"/><line x1="3" y1="10" x2="21" y2="10"/><polygon points="12 2 3 10 21 10"/><line x1="6" y1="10" x2="6" y2="22"/><line x1="10" y1="10" x2="10" y2="22"/><line x1="14" y1="10" x2="14" y2="22"/><line x1="18" y1="10" x2="18" y2="22"/></svg>
    </div>
    <div class="sidebar-brand">FAMS</div>
    <button class="sidebar-toggle" onclick="toggleSidebar()" title="메뉴 접기/펼치기">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="sidebar-section">MAIN</div>
  <ul class="sidebar-nav">
    <li><a href="#">
      <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
      <span class="menu-text">대시보드</span>
    </a></li>
    <li><a href="/" class="active">
      <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg></span>
      <span class="menu-text">해외출장관리</span>
    </a></li>
  </ul>
  <div class="sidebar-user">
    <div class="user-avatar">
      <span id="userPhotoFallback" style="display:flex;width:100%;height:100%;align-items:center;justify-content:center;">박</span>
      <img src="/api/user-photo" alt="" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:50%;"
        onload="if(this.naturalWidth>0){this.style.display='block';document.getElementById('userPhotoFallback').style.display='none';}"
        onerror="this.style.display='none';">
    </div>
    <div class="user-info">
      <div class="user-name">박병훈 부장 <span style="color:#94a3b8;font-weight:400;font-size:11px">HR팀</span></div>
      <div class="user-meta">marinhoon@bodyfriend.co.kr</div>
    </div>
  </div>
  <div class="sidebar-logout">
    <a href="#" onclick="doLogout()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span class="logout-text">로그아웃</span>
    </a>
  </div>
</aside>
<script>
(function() {
  const collapsed = localStorage.getItem('sidebarCollapsed') === '1';
  if (collapsed) {
    document.getElementById('sidebar').classList.add('collapsed');
    document.body.classList.add('sidebar-collapsed');
  }
})();
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const isCollapsed = sidebar.classList.toggle('collapsed');
  document.body.classList.toggle('sidebar-collapsed', isCollapsed);
  localStorage.setItem('sidebarCollapsed', isCollapsed ? '1' : '0');
}
function doLogout() {
  localStorage.clear();
  sessionStorage.clear();
  document.cookie.split(';').forEach(c => {
    document.cookie = c.trim().split('=')[0] + '=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/';
  });
  location.href = 'https://portal.bodyfriend.co.kr/portal/main/portalMain.do';
}
</script>

<main class="main">
  <div class="page-header">
    <h1 class="page-title">
      <span class="page-title-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </span>
      {{ '신규 등록' if not row else '출장 정보 수정' }}
      {% if row %}<span style="color:var(--text-muted);font-size:13px;font-weight:500;margin-left:4px">#{{ row.id }}</span>{% endif %}
    </h1>
    <a href="/" class="btn btn-secondary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      목록으로
    </a>
  </div>

  <form method="post" action="{{ action }}">
    <div class="form-card">
      <div class="form-body">

        <!-- 출장 내용 -->
        <div class="section-title-form">✈ 출장 내용</div>
        <div class="form-grid">
          <div class="form-group-modern">
            <label>부서</label>
            <input type="text" name="department" value="{{ row.department or '' if row else '' }}">
          </div>
          <div class="form-group-modern">
            <label>직급</label>
            <input type="text" name="position" value="{{ row.position or '' if row else '' }}">
          </div>
          <div class="form-group-modern">
            <label>성명</label>
            <input type="text" name="name" value="{{ row.name or '' if row else '' }}">
          </div>
          <div class="form-group-modern">
            <label>출장목적 (A/B/C 등)</label>
            <input type="text" name="trip_purpose" maxlength="5" value="{{ row.trip_purpose or '' if row else '' }}">
          </div>
          <div class="form-group-modern">
            <label>국가</label>
            <input type="text" name="country" value="{{ row.country or '' if row else '' }}">
          </div>
          <div class="form-group-modern">
            <label>지역</label>
            <input type="text" name="region" value="{{ row.region or '' if row else '' }}">
          </div>
          <div class="form-group-modern">
            <label>시작일</label>
            <input type="date" name="start_date" value="{{ row.start_date|string if row and row.start_date else '' }}">
          </div>
          <div class="form-group-modern">
            <label>종료일</label>
            <input type="date" name="end_date" value="{{ row.end_date|string if row and row.end_date else '' }}">
          </div>
          <div class="form-group-modern span-4">
            <label>제목</label>
            <input type="text" name="title" value="{{ row.title or '' if row else '' }}">
          </div>
          <div class="form-group-modern span-2">
            <label>해외출장품의서 (문서번호)</label>
            <input type="text" name="application_doc_no" value="{{ row.application_doc_no or '' if row else '' }}">
          </div>
          <div class="form-group-modern span-2">
            <label>해외출장보고서 (문서번호)</label>
            <input type="text" name="report_doc_no" value="{{ row.report_doc_no or '' if row else '' }}">
          </div>
        </div>

        <!-- 직원 경비 -->
        <div class="section-title-form">💼 직원 경비</div>
        <div class="form-grid">
          <div class="form-group-modern">
            <label>출장일비</label>
            <input type="number" step="0.01" name="daily_allowance" value="{{ row.daily_allowance or '' if row else '' }}">
          </div>
          <div class="form-group-modern">
            <label>보고서 승인 완료일</label>
            <input type="date" name="report_approval_date" value="{{ row.report_approval_date|string if row and row.report_approval_date else '' }}">
          </div>
          <div class="form-group-modern">
            <label>일비지급일</label>
            <input type="date" name="daily_allowance_date" value="{{ row.daily_allowance_date|string if row and row.daily_allowance_date else '' }}">
          </div>
          <div class="form-group-modern">
            <label>개인경비</label>
            <input type="number" step="0.01" name="personal_expense" value="{{ row.personal_expense or '' if row else '' }}">
          </div>
        </div>

        <!-- 발생 비용 -->
        <div class="section-title-form">💰 발생 비용</div>
        <div class="form-grid">
          <div class="form-group-modern">
            <label>항공료</label>
            <input type="number" step="0.01" name="airfare" value="{{ row.airfare or '' if row else '' }}">
          </div>
          <div class="form-group-modern">
            <label>여행사수수료</label>
            <input type="number" step="0.01" name="agency_fee" value="{{ row.agency_fee or '' if row else '' }}">
          </div>
          <div class="form-group-modern">
            <label>환불액</label>
            <input type="number" step="0.01" name="refund_amount" value="{{ row.refund_amount or '' if row else '' }}">
          </div>
          <div class="form-group-modern">
            <label>숙박비</label>
            <input type="number" step="0.01" name="accommodation" value="{{ row.accommodation or '' if row else '' }}">
          </div>
          <div class="form-group-modern">
            <label>교통비</label>
            <input type="number" step="0.01" name="transportation" value="{{ row.transportation or '' if row else '' }}">
          </div>
          <div class="form-group-modern">
            <label>식대</label>
            <input type="number" step="0.01" name="meal_expense" value="{{ row.meal_expense or '' if row else '' }}">
          </div>
          <div class="form-group-modern span-2">
            <label>기타 (비자/여행자보험/e-sim)</label>
            <input type="number" step="0.01" name="other_expense" value="{{ row.other_expense or '' if row else '' }}">
          </div>
        </div>

        <!-- 부가 정보 -->
        <div class="section-title-form">🏷 부가 정보</div>
        <div class="form-grid">
          <div class="form-group-modern">
            <label>항공료결제일</label>
            <input type="date" name="airfare_payment_date" value="{{ row.airfare_payment_date|string if row and row.airfare_payment_date else '' }}">
          </div>
          <div class="form-group-modern">
            <label>결제카드</label>
            <input type="text" name="payment_card" value="{{ row.payment_card or '삼성(2894)' if row else '삼성(2894)' }}">
          </div>
          <div class="form-group-modern">
            <label>구매처</label>
            <input type="text" name="purchase_place" value="{{ row.purchase_place or '레드캡투어' if row else '레드캡투어' }}">
          </div>
          <div class="form-group-modern">
            <label>항공사</label>
            <input type="text" name="airline" value="{{ row.airline or '' if row else '' }}">
          </div>
          <div class="form-group-modern">
            <label>예약등급</label>
            <input type="text" name="booking_class" placeholder="이코노미 / 비즈니스" value="{{ row.booking_class or '' if row else '' }}">
          </div>
          <div class="form-group-modern">
            <label>취소/변경</label>
            <input type="text" name="cancel_change" value="{{ row.cancel_change or '' if row else '' }}">
          </div>
          <div class="form-group-modern">
            <label>규정</label>
            <input type="text" name="compliance" value="{{ row.compliance or '' if row else '' }}">
          </div>
          <div class="form-group-modern">
            <label>발권완료 여부</label>
            <input type="text" name="ticketing_completed" value="{{ row.ticketing_completed or '' if row else '' }}">
          </div>
          <div class="form-group-modern">
            <label>문서상태</label>
            <select name="doc_status">
              <option value="">-</option>
              <option value="진행중" {{ 'selected' if row and row.doc_status == '진행중' else '' }}>진행중</option>
              <option value="완료" {{ 'selected' if row and row.doc_status == '완료' else '' }}>완료</option>
            </select>
          </div>
          <div class="form-group-modern span-4">
            <label>규정위반사유</label>
            <textarea name="violation_reason">{{ row.violation_reason or '' if row else '' }}</textarea>
          </div>
          <div class="form-group-modern span-4">
            <label>비고</label>
            <textarea name="memo">{{ row.memo or '' if row else '' }}</textarea>
          </div>
        </div>

      </div>
      <div class="form-actions-bar">
        <a href="/" class="btn btn-secondary">취소</a>
        <button type="submit" class="btn btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          저장
        </button>
      </div>
    </div>
  </form>
</main>
</body>
</html>

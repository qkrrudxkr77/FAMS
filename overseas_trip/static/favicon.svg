<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="100" height="100" fill="url(#bgGradient)"/>

  <!-- 건물 -->
  <g transform="translate(50, 50)">
    <!-- 건물 지붕 -->
    <polygon points="0,-35 -30,-5 30,-5" fill="#ffffff" opacity="0.3"/>

    <!-- 건물 본체 -->
    <rect x="-25" y="-5" width="50" height="40" fill="none" stroke="#ffffff" stroke-width="2.5"/>

    <!-- 창문들 (3x3) -->
    <rect x="-20" y="0" width="6" height="6" fill="#ffffff"/>
    <rect x="-8" y="0" width="6" height="6" fill="#ffffff"/>
    <rect x="4" y="0" width="6" height="6" fill="#ffffff"/>

    <rect x="-20" y="12" width="6" height="6" fill="#ffffff"/>
    <rect x="-8" y="12" width="6" height="6" fill="#ffffff"/>
    <rect x="4" y="12" width="6" height="6" fill="#ffffff"/>

    <rect x="-20" y="24" width="6" height="6" fill="#ffffff"/>
    <rect x="-8" y="24" width="6" height="6" fill="#ffffff"/>
    <rect x="4" y="24" width="6" height="6" fill="#ffffff"/>
  </g>
</svg>